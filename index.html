            // 2. 그 외(안드로이드, PC 등) 사용자라면: 기존 GAS 웹 앱으로 이동
            location.replace('https://script.google.com/macros/s/AKfycbyxMbFpCd_5YUPS8ZkcxbLL-LMC_Wqk0sTwPUSY5FZMo9iF95z_FeZ1vRXXrEWuEC4O/exec');

    </script>
</head>
