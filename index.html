<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>작업허가서</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Malgun Gothic', sans-serif; background: #f0f4f8; padding: 16px; min-height: 100vh; }
  .title { text-align: center; font-size: 18px; font-weight: bold; color: #1a5276; margin-bottom: 16px; padding: 12px; background: white; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }

  /* 버튼 */
  .upload-area { display: flex; gap: 10px; margin-bottom: 16px; }
  .upload-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px 8px; border-radius: 12px; font-size: 14px; font-weight: bold; color: white; cursor: pointer; border: none; gap: 6px; }
  .upload-btn:active { opacity: 0.75; }
  .upload-btn .icon { font-size: 22px; }
  .btn-pdf     { background: linear-gradient(135deg, #8e44ad, #6c3483); box-shadow: 0 3px 8px rgba(142,68,173,0.3); }
  .btn-analyze { background: linear-gradient(135deg, #2e75b6, #1a5276); box-shadow: 0 3px 8px rgba(46,117,182,0.3); }
  #pdfFileInput, #analyzeFileInput { display: none; }

  /* PDF 미리보기 */
  #pdf-section { display: none; margin-bottom: 16px; }
  .pdf-preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .pdf-thumb { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 3/4; background: #ddd; }
  .pdf-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .pdf-thumb .del-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .pdf-add-btn { border-radius: 8px; border: 2px dashed #8e44ad; background: #f8f0fd; color: #8e44ad; font-size: 24px; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  #makePdfBtn { width: 100%; padding: 13px; background: linear-gradient(135deg, #8e44ad, #6c3483); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 16px; box-shadow: 0 3px 8px rgba(142,68,173,0.3); }
  #makePdfBtn:active { opacity: 0.8; }

  /* 허가서 분석 미리보기 */
  #analyze-preview-wrap { display: none; margin-bottom: 12px; position: relative; text-align: center; }
  #analyze-preview-wrap img { max-width: 100%; max-height: 200px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .preview-reset-btn { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.55); color: white; border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .analyze-btns { display: flex; gap: 8px; margin-bottom: 16px; }
  #analyzeBtn { flex: 1; display: none; padding: 14px; background: linear-gradient(135deg, #27ae60, #1e8449); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 8px rgba(39,174,96,0.3); }
  #analyzeBtn:active { opacity: 0.8; }
  #reanalyzeBtn { display: none; padding: 14px 16px; background: #eaf4f0; color: #1e8449; border: none; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; white-space: nowrap; }
  #reanalyzeBtn:active { background: #27ae60; color: white; }

  #loading { display: none; text-align: center; padding: 20px; color: #2e75b6; font-size: 15px; font-weight: bold; }
  .spinner { width: 36px; height: 36px; border: 4px solid #e0e0e0; border-top-color: #2e75b6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .section-label { font-size: 12px; color: #888; font-weight: bold; letter-spacing: 1px; margin-bottom: 8px; padding-left: 4px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .section-header .section-label { margin-bottom: 0; }
  .section-link { font-size: 12px; color: #2e75b6; font-weight: bold; text-decoration: none; }
  .card { background: white; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); overflow: hidden; }
  .row { display: flex; align-items: center; padding: 13px 16px; border-bottom: 1px solid #f0f0f0; }
  .row:last-child { border-bottom: none; }
  .row-label { font-size: 12px; color: #888; width: 72px; flex-shrink: 0; }
  .row-value { font-size: 15px; font-weight: 600; color: #1c1c1e; flex: 1; word-break: break-all; }
  .row-value.empty { color: #ccc; font-weight: normal; font-style: italic; }
  .copy-btn { background: #e8f1fb; color: #2e75b6; border: none; border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: bold; cursor: pointer; flex-shrink: 0; margin-left: 8px; transition: background 0.15s, color 0.15s; }
  .copy-btn:active { background: #2e75b6; color: white; }
  .copy-btn.copied { background: #27ae60; color: white; }
  .copy-all-btn { width: 100%; padding: 13px; background: #1a5276; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 20px; box-shadow: 0 3px 8px rgba(26,82,118,0.3); }
  .copy-all-btn:active { opacity: 0.8; }

  .app-buttons { display: flex; gap: 10px; margin-bottom: 16px; }
  .app-btn { flex: 1; display: block; text-align: center; text-decoration: none; padding: 13px 6px; border-radius: 12px; font-size: 13px; font-weight: bold; color: white; box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
  .app-btn:active { opacity: 0.75; }
  .app-btn .icon { font-size: 20px; display: block; margin-bottom: 3px; }
  .btn-safety { background: linear-gradient(135deg, #1e8449, #196f3d); }
  .btn-kakao  { background: linear-gradient(135deg, #f9e000, #e6c800); color: #3c1e1e; }
  .btn-band   { background: linear-gradient(135deg, #00c73c, #009e30); }

  /* 토스트 & 인라인 알림 */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(0,0,0,0.75); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: rgba(192,57,43,0.9); }

  #api-error { display: none; background: #fdf0ee; border: 1px solid #e74c3c; border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; color: #c0392b; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>

<div class="title">📋 작업허가서 분석</div>

<!-- API 오류 박스 -->
<div id="api-error"></div>

<!-- 파일 input -->
<input type="file" id="pdfFileInput" accept="image/*" multiple>
<input type="file" id="analyzeFileInput" accept="image/*">

<!-- 버튼 -->
<div class="upload-area">
  <button class="upload-btn btn-pdf" onclick="document.getElementById('pdfFileInput').click()">
    <span class="icon">🖼️</span>PDF용 사진가져오기
  </button>
  <button class="upload-btn btn-analyze" onclick="document.getElementById('analyzeFileInput').click()">
    <span class="icon">🖼️</span>허가서 사진가져오기
  </button>
</div>

<!-- PDF 섹션 -->
<div id="pdf-section">
  <div class="section-label">PDF 사진 목록 <span id="pdf-count" style="color:#8e44ad"></span></div>
  <div class="pdf-preview-grid" id="pdf-grid">
    <div class="pdf-add-btn" onclick="document.getElementById('pdfFileInput').click()">+</div>
  </div>
  <button id="makePdfBtn" onclick="makePdf()">📄 PDF 생성하기</button>
</div>

<!-- 허가서 분석 미리보기 -->
<div id="analyze-preview-wrap">
  <img id="analyze-preview-img" src="" alt="미리보기">
  <button class="preview-reset-btn" onclick="resetAnalyzePhoto()" title="사진 변경">✕</button>
</div>
<div class="analyze-btns">
  <button id="analyzeBtn"   onclick="analyze()">🔍 분석하기</button>
  <button id="reanalyzeBtn" onclick="analyze()">↺ 재분석</button>
</div>

<div id="loading">
  <div class="spinner"></div>
  분석 중입니다...
</div>

<!-- 분석 결과 -->
<div class="section-label">분석 결과</div>
<div class="card">
  <div class="row">
    <span class="row-label">허가번호</span>
    <span class="row-value empty" id="v-permit">—</span>
    <button class="copy-btn" onclick="copyVal('v-permit','허가번호',this)">복사</button>
  </div>
  <div class="row">
    <span class="row-label">오더번호</span>
    <span class="row-value empty" id="v-order">—</span>
    <button class="copy-btn" onclick="copyVal('v-order','오더번호',this)">복사</button>
  </div>
  <div class="row">
    <span class="row-label">작업명</span>
    <span class="row-value empty" id="v-task">—</span>
    <button class="copy-btn" onclick="copyVal('v-task','작업명',this)">복사</button>
  </div>
  <div class="row">
    <span class="row-label">작업일</span>
    <span class="row-value empty" id="v-date">—</span>
    <button class="copy-btn" onclick="copyVal('v-date','작업일',this)">복사</button>
  </div>
  <div class="row">
    <span class="row-label">작업인원</span>
    <span class="row-value empty" id="v-people">—</span>
    <button class="copy-btn" onclick="copyVal('v-people','작업인원',this)">복사</button>
  </div>
</div>

<button class="copy-all-btn" onclick="copyAll()">📋 전체 내용 복사</button>

<div class="section-header">
  <span class="section-label">바로가기</span>
  <a class="section-link" href="https://juneylee.github.io/sc4Permit/4SC.html">아이폰 단축어용</a>
</div>
<div class="app-buttons">
  <a class="app-btn btn-safety" href="https://sahps.kr/safety/workpermitreg/" onclick="copyTask()">
    <span class="icon">🛡️</span>안전보건
  </a>
  <a class="app-btn btn-kakao" href="kakaotalk://" onclick="copyTask()">
    <span class="icon">💬</span>카카오톡
  </a>
  <a class="app-btn btn-band" href="bandapp://" onclick="copyTask()">
    <span class="icon">📣</span>네이버밴드
  </a>
</div>

<div class="toast" id="toast"></div>

<script>
  /* ── 상태 ── */
  let analyzeBase64 = '';
  let analyzeMime   = '';
  let pdfImages = [];
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwqkC8Bvx8aCVjEUuOpXFeoo5nTCo6k_QRgTquJNofRM-IxZB2rEnBhv44ZBZiTpXut/exec';

  /* ── URL 파라미터 처리 ── */
  const params = new URLSearchParams(window.location.search);
  [['permit','v-permit'],['order','v-order'],['task','v-task'],['date','v-date'],['people','v-people']]
    .forEach(([key, id]) => {
      const val = params.get(key);
      if (val && val !== 'null') setVal(id, decodeURIComponent(val));
    });

  /* ── PDF 사진 선택 ── */
  document.getElementById('pdfFileInput').addEventListener('change', function(e) {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        pdfImages.push({ dataUrl: ev.target.result, mime: file.type });
        renderPdfGrid();
      };
      reader.readAsDataURL(file);
    });
    this.value = '';
  });

  function renderPdfGrid() {
    const grid = document.getElementById('pdf-grid');
    grid.innerHTML = '';
    pdfImages.forEach((img, i) => {
      const div = document.createElement('div');
      div.className = 'pdf-thumb';
      div.innerHTML = `<img src="${img.dataUrl}"><button class="del-btn" onclick="removePdfImg(${i})">×</button>`;
      grid.appendChild(div);
    });
    const add = document.createElement('div');
    add.className = 'pdf-add-btn';
    add.textContent = '+';
    add.onclick = () => document.getElementById('pdfFileInput').click();
    grid.appendChild(add);
    document.getElementById('pdf-section').style.display = pdfImages.length ? 'block' : 'none';
    document.getElementById('pdf-count').textContent = pdfImages.length + '장';
  }

  function removePdfImg(i) {
    pdfImages.splice(i, 1);
    if (!pdfImages.length) {
      document.getElementById('pdf-section').style.display = 'none';
    } else {
      renderPdfGrid();
    }
  }

  async function makePdf() {
    if (!pdfImages.length) { showToast('사진을 먼저 선택하세요', true); return; }
    const btn = document.getElementById('makePdfBtn');
    btn.disabled = true;
    btn.textContent = '⏳ 생성 중...';
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const W = 210, H = 297;
      for (let i = 0; i < pdfImages.length; i++) {
        if (i > 0) doc.addPage();
        const imgEl = new Image();
        await new Promise(res => { imgEl.onload = res; imgEl.src = pdfImages[i].dataUrl; });
        const ratio = Math.min(W / imgEl.width, H / imgEl.height);
        const w = imgEl.width * ratio, h = imgEl.height * ratio;
        doc.addImage(pdfImages[i].dataUrl,
          pdfImages[i].mime === 'image/png' ? 'PNG' : 'JPEG',
          (W - w) / 2, (H - h) / 2, w, h);
      }
      const now  = new Date();
      const date = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
      doc.save(`permit_${date}.pdf`);   // 한글 파일명 대신 ASCII로 iOS 안전
      showToast('PDF 저장 완료!');
    } catch(e) {
      showToast('PDF 생성 오류: ' + e.message, true);
    } finally {
      btn.disabled = false;
      btn.textContent = '📄 PDF 생성하기';
    }
  }

  /* ── 허가서 분석 사진 선택 ── */
  document.getElementById('analyzeFileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    analyzeMime = file.type || 'image/jpeg';
    compressImage(file, 1280, 0.82, dataUrl => {
      analyzeBase64 = dataUrl.split(',')[1];
      document.getElementById('analyze-preview-img').src = dataUrl;
      document.getElementById('analyze-preview-wrap').style.display = 'block';
      document.getElementById('analyzeBtn').style.display   = 'block';
      document.getElementById('reanalyzeBtn').style.display = 'none';
      hideApiError();
    });
    this.value = '';
  });

  /* 사진 리셋 */
  function resetAnalyzePhoto() {
    analyzeBase64 = '';
    analyzeMime   = '';
    document.getElementById('analyze-preview-wrap').style.display = 'none';
    document.getElementById('analyzeBtn').style.display   = 'none';
    document.getElementById('reanalyzeBtn').style.display = 'none';
    document.getElementById('analyzeFileInput').click();   // 바로 새 사진 선택
  }

  /* ── 이미지 압축 ── */
  function compressImage(file, maxPx, quality, cb) {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (Math.max(w, h) > maxPx) {
          const r = maxPx / Math.max(w, h);
          w = Math.round(w * r);
          h = Math.round(h * r);
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  /* ── JSONP로 API 키 받기 ── */
  function fetchApiKey() {
    return new Promise((resolve, reject) => {
      const cbName = 'cb_' + Date.now();
      const script = document.createElement('script');
      const timer  = setTimeout(() => {
        delete window[cbName];
        document.body.removeChild(script);
        reject(new Error('GAS 응답 시간 초과'));
      }, 10000);
      window[cbName] = function(data) {
        clearTimeout(timer);
        delete window[cbName];
        document.body.removeChild(script);
        if (data && data.key) resolve(data.key);
        else reject(new Error('키 없음'));
      };
      script.src = GAS_URL + '?callback=' + cbName;
      script.onerror = () => { clearTimeout(timer); reject(new Error('스크립트 로드 실패')); };
      document.body.appendChild(script);
    });
  }

  /* ── Gemini 분석 ── */
  async function analyze() {
    if (!analyzeBase64) return;
    hideApiError();
    document.getElementById('analyzeBtn').style.display   = 'none';
    document.getElementById('reanalyzeBtn').style.display = 'none';
    document.getElementById('loading').style.display      = 'block';

    try {
      // 1. GAS에서 API 키 받기 (JSONP)
      const apiKey = await fetchApiKey();

      // 2. Gemini 직접 호출
      const prompt = `작업허가서를 촬영한 사진입니다.
유효한 JSON 객체만 출력하세요. JSON 외 텍스트 없이.
작업명이 두 줄에 걸쳐 있을 수 있으니 이어서 인식하세요.
작업인원은 숫자만 추출하세요 (예: "3명" → "3").
값을 읽을 수 없으면 null.
{"허가번호":"","오더번호":"","작업명":"","작업일":"","작업인원":""}`;

      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [
              { text: prompt },
              { inline_data: { mime_type: 'image/jpeg', data: analyzeBase64 } }
            ]}]
          })
        }
      );
      const data = await res.json();

      if (data.error) {
        const msg = data.error.message || '';
        if (data.error.code === 429 || msg.includes('quota') || msg.includes('RESOURCE_EXHAUSTED')) {
          showApiError('⚠️ 무료 API 한도 초과\n오늘 사용량이 한계에 도달했습니다. 내일 다시 시도하세요.');
        } else {
          showApiError('Gemini 오류 ' + data.error.code + '\n' + msg);
        }
        return;
      }

      let text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      text = text.replace(/```json/g,'').replace(/```/g,'').trim();
      const json = JSON.parse(text);
      setVal('v-permit', json['허가번호']);
      setVal('v-order',  json['오더번호']);
      setVal('v-task',   json['작업명']);
      setVal('v-date',   json['작업일']);
      setVal('v-people', json['작업인원']);
      showToast('분석 완료 ✓');

    } catch(e) {
      showApiError('분석 오류\ntype: ' + e.name + '\nmessage: ' + e.message);
    } finally {
      document.getElementById('loading').style.display      = 'none';
      document.getElementById('reanalyzeBtn').style.display = 'block';
    }
  }

  /* ── 유틸 ── */
  function pad(n) { return String(n).padStart(2,'0'); }

  function setVal(id, val) {
    const el = document.getElementById(id);
    if (val && val !== 'null' && String(val).trim() !== '') {
      el.textContent = String(val);
      el.classList.remove('empty');
    } else {
      el.textContent = '—';
      el.classList.add('empty');
    }
  }

  function showToast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast show' + (isErr ? ' error' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  function showApiError(msg) {
    const el = document.getElementById('api-error');
    el.style.display = 'block';
    el.textContent   = msg;
  }
  function hideApiError() {
    document.getElementById('api-error').style.display = 'none';
  }

  function copyVal(id, label, btn) {
    const val = document.getElementById(id).textContent;
    if (val === '—') { showToast('값이 없습니다', true); return; }
    const write = () => {
      if (btn) { btn.textContent = '✓'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1200); }
    };
    navigator.clipboard.writeText(val)
      .then(() => { write(); })
      .catch(() => { fallbackCopy(val); write(); });
  }

  function copyAll() {
    const fields = [
      ['v-permit','허가번호'],
      ['v-order', '오더번호'],
      ['v-task',  '작업명  '],
      ['v-date',  '작업일  '],
      ['v-people','작업인원'],
    ];
    const filled = fields.filter(([id]) => document.getElementById(id).textContent !== '—');
    if (!filled.length) { showToast('분석 결과가 없습니다', true); return; }
    const lines = filled.map(([id, label]) => label + ' : ' + document.getElementById(id).textContent).join('\n');
    navigator.clipboard.writeText(lines)
      .then(() => showToast('전체 복사 완료'))
      .catch(() => { fallbackCopy(lines); showToast('전체 복사 완료'); });
  }

  function copyTask() {
    const val = document.getElementById('v-task').textContent;
    if (val === '—') return;
    navigator.clipboard.writeText(val).catch(() => fallbackCopy(val));
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
</script>
</body>
</html>
