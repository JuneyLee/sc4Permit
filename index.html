<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>시스템 접속</title>
    <style>
        /* 화면 전체를 채우기 위한 기본 설정 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        /* iframe이 전체 화면을 꽉 채우도록 설정 */
        #content-frame {
            border: none;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 로딩 화면 스타일 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #3498db;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 로딩 완료 후 숨김 처리 */
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- 로딩 화면 표시 -->
    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <p style="color: #666; font-size: 14px;">페이지를 불러오는 중입니다...</p>
    </div>

    <!-- 콘텐츠가 표시될 iframe -->
    <iframe id="content-frame" src="about:blank" allow="geolocation; microphone; camera; clipboard-write"></iframe>

    <script>
        /**
         * 사용자의 기기를 체크하여 적절한 주소를 iframe에 삽입합니다.
         */
        function initializeApp() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const iframe = document.getElementById('content-frame');
            const loader = document.getElementById('loader');

            // iOS 기기 여부 판단
            const isIOS = /iPhone|iPad|iPod/i.test(userAgent) || 
                          (/CriOS|FxiOS|OPiOS/i.test(userAgent));

            // 각 환경별 대상 URL
            const iosUrl = 'https://juneylee.github.io/sc4Permit/4SC.html';
            const gasUrl = 'https://script.google.com/macros/s/AKfycbyl1JGaeR33IQbLwtR2UIZ47cgsDKzPhM8n58EKIRw628s8xvhTwkotm9HyU9CQ_e1i/exec';

            // 기기에 맞는 URL 할당
            iframe.src = isIOS ? iosUrl : gasUrl;

            // iframe 내부의 로드가 완료되면 로딩 화면을 숨깁니다.
            iframe.onload = function() {
                setTimeout(() => {
                    loader.classList.add('hidden');
                }, 200); // 부드러운 전환을 위한 미세한 지연
            };
        }

        // 페이지 로드 시 앱 초기화 실행
        window.onload = initializeApp;
    </script>
</body>
</html>
