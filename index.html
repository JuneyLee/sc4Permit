<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작업허가서 분석 시스템</title>
    <script>
        const ua = navigator.userAgent;
        const isIOS = /iPhone|iPad|iPod/i.test(ua) || (/CriOS|FxiOS|OPiOS/i.test(ua));

        if (isIOS) {
            // 아이폰 사용자 -> 4SC.html로 이동
            location.replace('4SC.html');
        } else {
            // 안드로이드/PC 사용자 -> AndApp.html로 이동
            location.replace('AndApp.html');
        }
    </script>
</head>
<body>
    <p style="text-align:center; margin-top:50px;">페이지 이동 중...</p>
</body>
</html>
