<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>작업허가서 분석 (안드로이드/PC)</title>
  <!-- React & Tailwind CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: -apple-system, 'Malgun Gothic', sans-serif; background: #f0f4f8; padding: 16px; min-height: 100vh; }
    .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* 4SC.html 스타일 복제 */
    .title-card { text-align: center; font-size: 18px; font-weight: bold; color: #1a5276; margin-bottom: 16px; padding: 12px; background: white; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    
    .btn-pdf { background: linear-gradient(135deg, #8e44ad, #6c3483); box-shadow: 0 3px 8px rgba(142,68,173,0.3); }
    .btn-analyze { background: linear-gradient(135deg, #e67e22, #ca6f1e); box-shadow: 0 3px 8px rgba(230,126,34,0.35); }
    .btn-copy-all { background: linear-gradient(135deg, #d35400, #b94600); box-shadow: 0 3px 8px rgba(211,84,0,0.35); }
    
    .section-label { font-size: 12px; color: #888; font-weight: bold; letter-spacing: 1px; margin-bottom: 8px; padding-left: 4px; }
    .card { background: white; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); overflow: hidden; }
    .row { display: flex; align-items: center; padding: 13px 16px; border-bottom: 1px solid #f0f0f0; }
    .row:last-child { border-bottom: none; }
    .row-label { font-size: 12px; color: #888; width: 72px; flex-shrink: 0; }
    .row-value { font-size: 15px; font-weight: 600; color: #1c1c1e; flex: 1; word-break: break-all; }
    .row-value.empty { color: #ccc; font-weight: normal; font-style: italic; }
    .copy-btn { background: #e8f1fb; color: #2e75b6; border: none; border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: bold; cursor: pointer; flex-shrink: 0; margin-left: 8px; transition: background 0.15s, color 0.15s; }
    .copy-btn:active { background: #2e75b6; color: white; }
    
    .app-btn { flex: 1; display: block; text-align: center; text-decoration: none; padding: 13px 6px; border-radius: 12px; font-size: 13px; font-weight: bold; color: white; box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
    .btn-safety { background: linear-gradient(135deg, #1e8449, #196f3d); }
    .btn-kakao  { background: linear-gradient(135deg, #f9e000, #e6c800); color: #3c1e1e; }
    .btn-band   { background: linear-gradient(135deg, #00c73c, #009e30); }

    /* PDF 미리보기 */
    .pdf-preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .pdf-thumb { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 3/4; background: #ddd; }
    .pdf-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .pdf-thumb .del-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .pdf-add-btn { border-radius: 8px; border: 2px dashed #8e44ad; background: #f8f0fd; color: #8e44ad; font-size: 24px; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .btn-make-pdf { width: 100%; padding: 13px; background: linear-gradient(135deg, #8e44ad, #6c3483); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 16px; box-shadow: 0 3px 8px rgba(142,68,173,0.3); }

    /* 토글 스위치 */
    .switch-container { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-bottom: 12px; padding-right: 4px; }
    .switch-label { font-size: 13px; color: #555; font-weight: 600; }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #8e44ad; }
    input:checked + .slider:before { transform: translateX(20px); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.run/@google/genai"
      }
    }
  </script>
  <script type="text/babel" data-type="module">
    import { GoogleGenAI, Type } from "@google/genai";
    const { useState, useEffect } = React;

    window.addEventListener('unhandledrejection', (event) => {
      console.error('Unhandled rejection:', event.reason);
      // alert('시스템 오류가 발생했습니다: ' + event.reason);
    });

    function App() {
      const [loading, setLoading] = useState(false);
      const [pdfLoading, setPdfLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [pdfImages, setPdfImages] = useState([]);
      const [isBW, setIsBW] = useState(true); // 기본값 흑백 활성
      const [toast, setToast] = useState({ show: false, msg: "", isErr: false });
      
      const showToast = (msg, isErr = false) => {
        console.log(`Toast: ${msg} (Error: ${isErr})`);
        setToast({ show: true, msg, isErr });
        setTimeout(() => setToast({ show: false, msg: "", isErr: false }), 3000);
      };

      const handleImageChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          console.log("Image selected:", file.name, file.type, file.size);
          const reader = new FileReader();
          reader.onloadend = () => {
            // 이미지 리사이징 (분석용)
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const ctx = canvas.getContext('2d');
              const MAX_SIZE = 1024; 
              let width = img.width;
              let height = img.height;

              if (width > height) {
                if (width > MAX_SIZE) {
                  height *= MAX_SIZE / width;
                  width = MAX_SIZE;
                }
              } else {
                if (height > MAX_SIZE) {
                  width *= MAX_SIZE / height;
                  height = MAX_SIZE;
                }
              }

              canvas.width = width;
              canvas.height = height;
              ctx.drawImage(img, 0, 0, width, height);
              
              const resizedBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
              analyzeImage(resizedBase64, 'image/jpeg');
            };
            img.onerror = (err) => {
              console.error("Image load error:", err);
              showToast("이미지를 불러오는데 실패했습니다.", true);
            };
            img.src = reader.result;
          };
          reader.onerror = (err) => {
            console.error("FileReader error:", err);
            showToast("파일을 읽는데 실패했습니다.", true);
          };
          reader.readAsDataURL(file);
        }
      };

      const handlePdfImagesChange = (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = ev => {
            setPdfImages(prev => [...prev, { dataUrl: ev.target.result, mime: file.type }]);
          };
          reader.readAsDataURL(file);
        });
        e.target.value = '';
      };

      const removePdfImg = (index) => {
        setPdfImages(prev => prev.filter((_, i) => i !== index));
      };

      const analyzeImage = async (base64, mime) => {
        setLoading(true);
        setResult(null);
        try {
          // AI Studio 환경에서는 process.env.GEMINI_API_KEY가 Vite에 의해 주입됩니다.
          let apiKey = "";
          try {
            apiKey = process.env.GEMINI_API_KEY;
          } catch (e) {
            console.warn("process.env.GEMINI_API_KEY is not available directly.");
          }
          
          console.log("API Key check:", apiKey ? "Key exists" : "Key missing");

          if (!apiKey || apiKey === "undefined" || apiKey === "") {
            throw new Error("API 키를 찾을 수 없습니다. AI Studio 설정에서 API 키가 등록되어 있는지 확인해주세요.");
          }

          const ai = new GoogleGenAI({ apiKey });
          const response = await ai.models.generateContent({
            model: "gemini-3-flash-preview", // 최신 모델 사용
            contents: {
              parts: [
                { text: "이 이미지는 작업허가서입니다. 이미지에서 허가번호, 오더번호, 작업명, 작업일, 작업인원 정보를 찾아주세요. 결과를 JSON 형식으로 출력하세요. 값을 찾을 수 없는 경우 '—'를 사용하세요." },
                { inlineData: { data: base64, mimeType: mime || "image/jpeg" } }
              ]
            },
            config: {
              responseMimeType: "application/json",
              responseSchema: {
                type: Type.OBJECT,
                properties: {
                  permitNumber: { type: Type.STRING },
                  orderNumber: { type: Type.STRING },
                  taskName: { type: Type.STRING },
                  taskDate: { type: Type.STRING },
                  workerCount: { type: Type.STRING }
                },
                required: ["permitNumber", "orderNumber", "taskName", "taskDate", "workerCount"]
              }
            }
          });

          if (!response || !response.text) {
            throw new Error("AI로부터 유효한 응답을 받지 못했습니다.");
          }

          const text = response.text;
          console.log("AI Response Text:", text);
          
          const data = JSON.parse(text);
          setResult({
            permitNumber: data.permitNumber || "—",
            orderNumber: data.orderNumber || "—",
            taskName: data.taskName || "—",
            taskDate: data.taskDate || "—",
            workerCount: data.workerCount || "—"
          });
          showToast("분석 완료!");
        } catch (error) {
          console.error("Detailed Analysis Error:", error);
          let errorMsg = error.message || "알 수 없는 오류가 발생했습니다.";
          
          // 구체적인 에러 메시지 처리
          if (errorMsg.includes("API key not valid")) {
            errorMsg = "API 키가 유효하지 않습니다. 다시 확인해주세요.";
          } else if (errorMsg.includes("quota")) {
            errorMsg = "API 할당량이 초과되었습니다.";
          }
          
          showToast(`분석 실패: ${errorMsg.substring(0, 50)}`, true);
          
          setResult({
            permitNumber: "에러 발생",
            orderNumber: "콘솔 확인",
            taskName: errorMsg,
            taskDate: "—",
            workerCount: "—"
          });
        } finally {
          setLoading(false);
        }
      };

      const processImageBW = (dataUrl) => {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const width = img.naturalWidth || img.width;
            const height = img.naturalHeight || img.height;
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
              const r = data[i], g = data[i+1], b = data[i+2];
              let v = 0.2126 * r + 0.7152 * g + 0.0722 * b;
              const contrast = 1.4; 
              const brightness = 20;
              v = (v - 128) * contrast + 128 + brightness;
              const finalVal = v < 0 ? 0 : (v > 255 ? 255 : v);
              data[i] = data[i + 1] = data[i + 2] = finalVal;
            }
            ctx.putImageData(imageData, 0, 0);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.onerror = () => resolve(dataUrl);
          img.src = dataUrl;
        });
      };

      const makePdf = async () => {
        if (!pdfImages.length) { showToast('사진을 먼저 선택하세요', true); return; }
        setPdfLoading(true);
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
          const W = 210, H = 297;
          for (let i = 0; i < pdfImages.length; i++) {
            if (i > 0) doc.addPage();
            let targetUrl = pdfImages[i].dataUrl;
            if (isBW) targetUrl = await processImageBW(targetUrl);
            const imgEl = new Image();
            await new Promise(res => { imgEl.onload = res; imgEl.src = targetUrl; });
            const ratio = Math.min(W / imgEl.width, H / imgEl.height);
            const w = imgEl.width * ratio, h = imgEl.height * ratio;
            doc.addImage(targetUrl, 'JPEG', (W - w) / 2, (H - h) / 2, w, h, undefined, 'NONE');
          }
          const now = new Date();
          const date = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
          doc.save(`permit_${date}.pdf`);
          showToast('PDF 저장 완료!');
        } catch(e) {
          showToast('PDF 생성 오류: ' + e.message, true);
        } finally {
          setPdfLoading(false);
        }
      };

      const copyToClipboard = (text) => {
        if (!text || text === "—") { showToast("값이 없습니다", true); return; }
        navigator.clipboard.writeText(text).then(() => showToast("복사되었습니다!")).catch(() => {
          const ta = document.createElement('textarea');
          ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          showToast("복사되었습니다!");
        });
      };

      const copyAll = () => {
        if (!result) return;
        const text = `허가번호: ${result.permitNumber}\n오더번호: ${result.orderNumber}\n작업명: ${result.taskName}\n작업일: ${result.taskDate}\n작업인원: ${result.workerCount}`;
        copyToClipboard(text);
      };

      return (
        <div className="max-w-md mx-auto min-h-screen">
          <div className="title-card">📋 작업허가서 분석 <span className="text-xs text-purple-600 font-normal ml-1">Android/PC v1.5</span></div>
          <div className="flex gap-2 mb-4">
            <label className="btn-pdf flex-1 flex flex-col items-center justify-center p-4 rounded-xl text-white font-bold cursor-pointer active:opacity-80 transition-opacity text-center">
              <span className="text-2xl mb-1">🖼️</span>
              <span className="text-sm">PDF용 사진가져오기</span>
              <input type="file" className="hidden" accept="image/*" multiple onChange={handlePdfImagesChange} />
            </label>
            <label className="btn-analyze flex-1 flex flex-col items-center justify-center p-4 rounded-xl text-white font-bold cursor-pointer active:opacity-80 transition-opacity text-center">
              <span className="text-2xl mb-1">🖼️</span>
              <span className="text-sm">허가서 사진가져오기</span>
              <input type="file" className="hidden" accept="image/*" onChange={handleImageChange} />
            </label>
          </div>
          {pdfImages.length > 0 && (
            <div className="mb-4">
              <div className="flex justify-between items-end mb-2">
                <div className="section-label mb-0">PDF 사진 목록 <span className="text-purple-600">{pdfImages.length}장</span></div>
                <div className="switch-container">
                  <span className="switch-label">스캔 모드(흑백)</span>
                  <label className="switch">
                    <input type="checkbox" checked={isBW} onChange={(e) => setIsBW(e.target.checked)} />
                    <span className="slider"></span>
                  </label>
                </div>
              </div>
              <div className="pdf-preview-grid">
                {pdfImages.map((img, i) => (
                  <div key={i} className="pdf-thumb">
                    <img src={img.dataUrl} style={{ filter: isBW ? 'grayscale(100%) contrast(150%) brightness(110%)' : 'none', transition: 'filter 0.3s' }} />
                    <button className="del-btn" onClick={() => removePdfImg(i)}>×</button>
                  </div>
                ))}
                <label className="pdf-add-btn">+<input type="file" className="hidden" accept="image/*" multiple onChange={handlePdfImagesChange} /></label>
              </div>
              <button onClick={makePdf} disabled={pdfLoading} className="btn-make-pdf">{pdfLoading ? '⏳ 생성 중...' : '📄 PDF 생성하기'}</button>
            </div>
          )}
          {loading && (
            <div className="flex flex-col items-center justify-center p-10">
              <div className="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
              <p className="text-gray-600 font-medium">Gemini AI가 분석 중입니다...</p>
            </div>
          )}
          <div className="section-label">분석 결과</div>
          <div className="card">
            {[
              { label: "허가번호", value: result?.permitNumber, id: "v-permit" },
              { label: "오더번호", value: result?.orderNumber, id: "v-order" },
              { label: "작업명", value: result?.taskName, id: "v-task" },
              { label: "작업일", value: result?.taskDate, id: "v-date" },
              { label: "작업인원", value: result?.workerCount, id: "v-people" }
            ].map((item) => (
              <div key={item.id} className="row">
                <span className="row-label">{item.label}</span>
                <span className={`row-value ${!item.value ? 'empty' : ''}`}>{item.value || "—"}</span>
                <button onClick={() => copyToClipboard(item.value)} className="copy-btn">복사</button>
              </div>
            ))}
          </div>
          <button onClick={copyAll} className="btn-copy-all w-full py-4 rounded-xl text-white font-bold mb-6 active:opacity-80 transition-opacity">📋 전체 내용 복사</button>
          <div className="flex justify-between items-center mb-2 px-1">
            <span className="section-label">바로가기</span>
            <a href="https://juneylee.github.io/sc4Permit/" className="text-xs text-blue-600 font-bold">일반 버전 1.4</a>
          </div>
          <div className="flex gap-2 mb-10">
            <a className="app-btn btn-safety" href="https://sahps.kr/safety/workpermitreg/"><span className="block text-xl mb-0.5">🛡️</span>안전보건</a>
            <a className="app-btn btn-kakao" href="kakaotalk://"><span className="block text-xl mb-0.5">💬</span>카카오톡</a>
            <a className="app-btn btn-band" href="bandapp://"><span className="block text-xl mb-0.5">📣</span>네이버밴드</a>
          </div>
          <div className={`fixed bottom-20 left-1/2 -translate-x-1/2 px-6 py-2.5 rounded-full text-white text-sm font-medium transition-all duration-300 pointer-events-none z-50 ${toast.show ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'} ${toast.isErr ? 'bg-red-600/90' : 'bg-black/75'}`}>{toast.msg}</div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
