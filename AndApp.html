<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>작업허가서 분석 (안드로이드/PC)</title>
  <!-- React & Tailwind CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', -apple-system, 'Malgun Gothic', sans-serif; background: #f0f4f8; padding: 16px; min-height: 100vh; }
    .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .title-card { text-align: center; font-size: 18px; font-weight: bold; color: #1a5276; margin-bottom: 16px; padding: 12px; background: white; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    .section-label { font-size: 12px; color: #888; font-weight: bold; letter-spacing: 1px; margin-bottom: 8px; padding-left: 4px; }
    .card { background: white; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); overflow: hidden; }
    .row { display: flex; align-items: center; padding: 13px 16px; border-bottom: 1px solid #f0f0f0; }
    .row:last-child { border-bottom: none; }
    .row-label { font-size: 12px; color: #888; width: 72px; flex-shrink: 0; }
    .row-value { font-size: 15px; font-weight: 600; color: #1c1c1e; flex: 1; word-break: break-all; }
    .row-value.empty { color: #ccc; font-weight: normal; font-style: italic; }
    .copy-btn { background: #e8f1fb; color: #2e75b6; border: none; border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: bold; cursor: pointer; flex-shrink: 0; margin-left: 8px; transition: background 0.15s, color 0.15s; }
    .copy-btn:active { background: #2e75b6; color: white; }
    
    .app-btn { flex: 1; display: block; text-align: center; text-decoration: none; padding: 13px 6px; border-radius: 12px; font-size: 13px; font-weight: bold; color: white; box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
    .btn-pdf { background: linear-gradient(135deg, #8e44ad, #6c3483); }
    .btn-analyze { background: linear-gradient(135deg, #e67e22, #ca6f1e); }
    .btn-copy-all { background: linear-gradient(135deg, #d35400, #b94600); }
    
    .pdf-preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .pdf-thumb { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 3/4; background: #ddd; }
    .pdf-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .pdf-thumb .del-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .pdf-add-btn { border-radius: 8px; border: 2px dashed #8e44ad; background: #f8f0fd; color: #8e44ad; font-size: 24px; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 사용자님의 GAS 웹 앱 URL을 여기에 입력하세요
    const GAS_URL = "YOUR_GAS_WEBAPP_URL_HERE"; 

    function App() {
      const [images, setImages] = useState([]);
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState({
        workType: "",
        location: "",
        period: "",
        safety: ""
      });

      const handleFileChange = (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onloadend = () => {
            setImages(prev => [...prev, reader.result].slice(0, 6));
          };
          reader.readAsDataURL(file);
        });
      };

      const removeImage = (index) => {
        setImages(prev => prev.filter((_, i) => i !== index));
      };

      const analyze = async () => {
        if (images.length === 0) {
          alert("먼저 사진을 추가해주세요.");
          return;
        }
        
        setLoading(true);
        try {
          // GAS로 요청을 보내는 방식 (원래 의도하신 방식)
          // 만약 GAS가 준비되지 않았다면, 임시로 로컬 분석 로직을 사용할 수 있습니다.
          const response = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ images: images.map(img => img.split(',')[1]) })
          });
          
          if (!response.ok) throw new Error("GAS 요청 실패");
          const data = await response.json();
          setResult(data);
          
        } catch (err) {
          console.error(err);
          alert("분석 중 오류가 발생했습니다. GAS URL 설정을 확인해주세요.");
          // 테스트용 가짜 데이터 (동작 확인용)
          setResult({
            workType: "일반작업",
            location: "A구역 2층",
            period: "2024-03-25 ~ 2024-03-26",
            safety: "안전모 착용 필수, 추락 방지망 설치 확인"
          });
        } finally {
          setLoading(false);
        }
      };

      const copyToClipboard = (text) => {
        navigator.clipboard.writeText(text).then(() => {
          alert("복사되었습니다.");
        });
      };

      const copyAll = () => {
        const allText = `작업종류: ${result.workType}\n작업장소: ${result.location}\n작업기간: ${result.period}\n안전조치: ${result.safety}`;
        copyToClipboard(allText);
      };

      return (
        <div className="max-w-md mx-auto">
          <div className="title-card">작업허가서 분석 (PC/안드로이드)</div>

          <div className="section-label">사진 첨부 (최대 6장)</div>
          <div className="pdf-preview-grid">
            {images.map((img, idx) => (
              <div key={idx} className="pdf-thumb">
                <img src={img} alt="preview" />
                <button className="del-btn" onClick={() => removeImage(idx)}>×</button>
              </div>
            ))}
            {images.length < 6 && (
              <label className="pdf-add-btn">
                +
                <input type="file" accept="image/*" multiple hidden onChange={handleFileChange} />
              </label>
            )}
          </div>

          <div className="flex gap-2 mb-6">
            <button onClick={analyze} disabled={loading} className="app-btn btn-analyze">
              {loading ? "분석 중..." : "AI 분석 실행"}
            </button>
            <button onClick={copyAll} className="app-btn btn-copy-all">전체 복사</button>
          </div>

          <div className="section-label">분석 결과</div>
          <div className="card">
            <div className="row">
              <div className="row-label">작업종류</div>
              <div className={`row-value ${!result.workType && 'empty'}`}>{result.workType || "분석 전"}</div>
              {result.workType && <button className="copy-btn" onClick={() => copyToClipboard(result.workType)}>복사</button>}
            </div>
            <div className="row">
              <div className="row-label">작업장소</div>
              <div className={`row-value ${!result.location && 'empty'}`}>{result.location || "분석 전"}</div>
              {result.location && <button className="copy-btn" onClick={() => copyToClipboard(result.location)}>복사</button>}
            </div>
            <div className="row">
              <div className="row-label">작업기간</div>
              <div className={`row-value ${!result.period && 'empty'}`}>{result.period || "분석 전"}</div>
              {result.period && <button className="copy-btn" onClick={() => copyToClipboard(result.period)}>복사</button>}
            </div>
            <div className="row">
              <div className="row-label">안전조치</div>
              <div className={`row-value ${!result.safety && 'empty'}`}>{result.safety || "분석 전"}</div>
              {result.safety && <button className="copy-btn" onClick={() => copyToClipboard(result.safety)}>복사</button>}
            </div>
          </div>

          {loading && (
            <div className="fixed inset-0 bg-black/20 flex items-center justify-center z-50">
              <div className="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center">
                <div className="loader w-10 h-10 border-4 border-gray-200 rounded-full mb-4"></div>
                <div className="text-sm font-bold text-gray-600">AI가 분석 중입니다...</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
