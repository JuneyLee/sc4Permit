<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>작업허가서 분석 (안드로이드/PC)</title>
  <!-- React & Tailwind CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f3f4f6; }
    .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [image, setImage] = useState(null);
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      
      // GAS URL (사용자님의 실제 배포 주소로 바꿔주세요)
      const GAS_URL = "https://script.google.com/macros/s/AKfycbyxMbFpCd_5YUPS8ZkcxbLL-LMC_Wqk0sTwPUSY5FZMo9iF95z_FeZ1vRXXrEWuEC4O/exec";

      const handleImageChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setImage(reader.result);
            analyzeImage(reader.result.split(',')[1]);
          };
          reader.readAsDataURL(file);
        }
      };

      const analyzeImage = async (base64) => {
        setLoading(true);
        try {
          const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ image: base64 })
          });
          const data = await response.json();
          setResult(data);
        } catch (error) {
          alert("분석 중 오류가 발생했습니다.");
        } finally {
          setLoading(false);
        }
      };

      const copyToClipboard = (text) => {
        navigator.clipboard.writeText(text);
        alert("복사되었습니다!");
      };

      return (
        <div className="max-w-md mx-auto p-4 min-h-screen">
          <header className="bg-white rounded-2xl shadow-sm p-6 mb-4 text-center">
            <h1 className="text-xl font-bold text-gray-800">📋 작업허가서 분석</h1>
            <p className="text-sm text-gray-500 mt-1">안드로이드 & PC 버전</p>
          </header>

          <main>
            <div className="bg-white rounded-2xl shadow-sm p-6 mb-4">
              <label className="block w-full py-4 px-6 bg-blue-50 border-2 border-dashed border-blue-200 rounded-xl text-center cursor-pointer hover:bg-blue-100 transition-colors">
                <span className="text-3xl mb-2 block">📸</span>
                <span className="text-blue-600 font-semibold">허가서 사진 선택하기</span>
                <input type="file" className="hidden" accept="image/*" onChange={handleImageChange} />
              </label>
            </div>

            {loading && (
              <div className="flex flex-col items-center justify-center p-10">
                <div className="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                <p className="text-gray-600 font-medium">Gemini AI가 분석 중입니다...</p>
              </div>
            )}

            {result && !loading && (
              <div className="space-y-3">
                <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
                  {[
                    { label: "허가번호", value: result.permitNumber, key: "permit" },
                    { label: "오더번호", value: result.orderNumber, key: "order" },
                    { label: "작업명", value: result.taskName, key: "task" },
                    { label: "작업일", value: result.taskDate, key: "date" },
                    { label: "작업인원", value: result.workerCount, key: "people" }
                  ].map((item) => (
                    <div key={item.key} className="flex items-center justify-between p-4 border-b border-gray-50 last:border-0">
                      <div>
                        <p className="text-xs text-gray-400 font-bold uppercase tracking-wider">{item.label}</p>
                        <p className="text-gray-800 font-semibold mt-0.5">{item.value || "—"}</p>
                      </div>
                      <button 
                        onClick={() => copyToClipboard(item.value)}
                        className="bg-gray-100 text-gray-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-500 hover:text-white transition-colors"
                      >
                        복사
                      </button>
                    </div>
                  ))}
                </div>
                
                <button 
                  onClick={() => {
                    const allText = `허가번호: ${result.permitNumber}\n오더번호: ${result.orderNumber}\n작업명: ${result.taskName}\n작업일: ${result.taskDate}\n작업인원: ${result.workerCount}`;
                    copyToClipboard(allText);
                  }}
                  className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition-transform"
                >
                  📋 전체 내용 복사하기
                </button>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
