<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>작업허가서 분석 (안드로이드/PC)</title>
  <!-- React & Tailwind CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: -apple-system, 'Malgun Gothic', sans-serif; background: #f0f4f8; padding: 16px; min-height: 100vh; }
    .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* 4SC.html 스타일 복제 */
    .title-card { text-align: center; font-size: 18px; font-weight: bold; color: #1a5276; margin-bottom: 16px; padding: 12px; background: white; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    
    .btn-analyze { background: linear-gradient(135deg, #e67e22, #ca6f1e); box-shadow: 0 3px 8px rgba(230,126,34,0.35); }
    .btn-copy-all { background: linear-gradient(135deg, #d35400, #b94600); box-shadow: 0 3px 8px rgba(211,84,0,0.35); }
    
    .section-label { font-size: 12px; color: #888; font-weight: bold; letter-spacing: 1px; margin-bottom: 8px; padding-left: 4px; }
    .card { background: white; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); overflow: hidden; }
    .row { display: flex; align-items: center; padding: 13px 16px; border-bottom: 1px solid #f0f0f0; }
    .row:last-child { border-bottom: none; }
    .row-label { font-size: 12px; color: #888; width: 72px; flex-shrink: 0; }
    .row-value { font-size: 15px; font-weight: 600; color: #1c1c1e; flex: 1; word-break: break-all; }
    .row-value.empty { color: #ccc; font-weight: normal; font-style: italic; }
    .copy-btn { background: #e8f1fb; color: #2e75b6; border: none; border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: bold; cursor: pointer; flex-shrink: 0; margin-left: 8px; transition: background 0.15s, color 0.15s; }
    .copy-btn:active { background: #2e75b6; color: white; }
    
    .app-btn { flex: 1; display: block; text-align: center; text-decoration: none; padding: 13px 6px; border-radius: 12px; font-size: 13px; font-weight: bold; color: white; box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
    .btn-safety { background: linear-gradient(135deg, #1e8449, #196f3d); }
    .btn-kakao  { background: linear-gradient(135deg, #f9e000, #e6c800); color: #3c1e1e; }
    .btn-band   { background: linear-gradient(135deg, #00c73c, #009e30); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [toast, setToast] = useState({ show: false, msg: "", isErr: false });
      
      // GAS URL (사용자님의 실제 배포 주소로 바꿔주세요)
      const GAS_URL = "https://script.google.com/macros/s/AKfycbyxMbFpCd_5YUPS8ZkcxbLL-LMC_Wqk0sTwPUSY5FZMo9iF95z_FeZ1vRXXrEWuEC4O/exec";

      const showToast = (msg, isErr = false) => {
        setToast({ show: true, msg, isErr });
        setTimeout(() => setToast({ show: false, msg: "", isErr: false }), 2000);
      };

      const handleImageChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            analyzeImage(reader.result.split(',')[1], file.type);
          };
          reader.readAsDataURL(file);
        }
      };

      const analyzeImage = async (base64, mime) => {
        setLoading(true);
        setResult(null);
        try {
          const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ image: base64, mime: mime })
          });
          const data = await response.json();
          
          if (data.error) {
            showToast(data.error, true);
          } else {
            setResult(data);
            showToast("분석 완료!");
          }
        } catch (error) {
          showToast("분석 중 오류가 발생했습니다.", true);
        } finally {
          setLoading(false);
        }
      };

      const copyToClipboard = (text) => {
        if (!text || text === "—") {
          showToast("값이 없습니다", true);
          return;
        }
        navigator.clipboard.writeText(text).then(() => {
          showToast("복사되었습니다!");
        }).catch(() => {
          // Fallback
          const ta = document.createElement('textarea');
          ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          showToast("복사되었습니다!");
        });
      };

      const copyAll = () => {
        if (!result) return;
        const text = `허가번호: ${result.permitNumber}\n오더번호: ${result.orderNumber}\n작업명: ${result.taskName}\n작업일: ${result.taskDate}\n작업인원: ${result.workerCount}`;
        copyToClipboard(text);
      };

      return (
        <div className="max-w-md mx-auto min-h-screen">
          <div className="title-card">📋 작업허가서 분석 <span className="text-xs text-purple-600 font-normal ml-1">Android/PC v1.4</span></div>

          <div className="mb-4">
            <label className="btn-analyze w-full flex flex-col items-center justify-center p-4 rounded-xl text-white font-bold cursor-pointer active:opacity-80 transition-opacity">
              <span className="text-2xl mb-1">📸</span>
              <span>허가서 사진가져오기</span>
              <input type="file" className="hidden" accept="image/*" onChange={handleImageChange} />
            </label>
          </div>

          {loading && (
            <div className="flex flex-col items-center justify-center p-10">
              <div className="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
              <p className="text-gray-600 font-medium">Gemini AI가 분석 중입니다...</p>
            </div>
          )}

          <div className="section-label">분석 결과</div>
          <div className="card">
            {[
              { label: "허가번호", value: result?.permitNumber, id: "v-permit" },
              { label: "오더번호", value: result?.orderNumber, id: "v-order" },
              { label: "작업명", value: result?.taskName, id: "v-task" },
              { label: "작업일", value: result?.taskDate, id: "v-date" },
              { label: "작업인원", value: result?.workerCount, id: "v-people" }
            ].map((item) => (
              <div key={item.id} className="row">
                <span className="row-label">{item.label}</span>
                <span className={`row-value ${!item.value ? 'empty' : ''}`}>
                  {item.value || "—"}
                </span>
                <button 
                  onClick={() => copyToClipboard(item.value)}
                  className="copy-btn"
                >
                  복사
                </button>
              </div>
            ))}
          </div>

          <button 
            onClick={copyAll}
            className="btn-copy-all w-full py-4 rounded-xl text-white font-bold mb-6 active:opacity-80 transition-opacity"
          >
            📋 전체 내용 복사
          </button>

          <div className="flex justify-between items-center mb-2 px-1">
            <span className="section-label">바로가기</span>
            <a href="https://juneylee.github.io/sc4Permit/" className="text-xs text-blue-600 font-bold">일반 버전 1.4</a>
          </div>
          <div className="flex gap-2 mb-10">
            <a className="app-btn btn-safety" href="https://sahps.kr/safety/workpermitreg/">
              <span className="block text-xl mb-0.5">🛡️</span>안전보건
            </a>
            <a className="app-btn btn-kakao" href="kakaotalk://">
              <span className="block text-xl mb-0.5">💬</span>카카오톡
            </a>
            <a className="app-btn btn-band" href="bandapp://">
              <span className="block text-xl mb-0.5">📣</span>네이버밴드
            </a>
          </div>

          {/* Toast */}
          <div className={`fixed bottom-20 left-1/2 -translate-x-1/2 px-6 py-2.5 rounded-full text-white text-sm font-medium transition-all duration-300 pointer-events-none z-50 ${toast.show ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'} ${toast.isErr ? 'bg-red-600/90' : 'bg-black/75'}`}>
            {toast.msg}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
